<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndianOil Lucky Draw — Operator Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --io-blue-900:#051B36; --io-blue-800:#0A3D7A; --io-blue-50:#F3F7FD;
  --io-orange-600:#F0680F; --io-orange-500:#F5821F;
  --ink-900:#101B33; --ink-700:#2B3652; --ink-600:#4B5875; --ink-400:#8792A6;
  --border:#E6EBF3; --danger:#D14343;
  --shadow-lg:0 20px 50px -12px rgba(10,61,122,0.25);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif; color:var(--ink-900); -webkit-font-smoothing:antialiased;}
h1{font-family:'Sora',sans-serif;}
button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--io-orange-500); outline-offset:2px;}

#login-view{min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  background:radial-gradient(circle at 15% 15%, rgba(245,130,31,0.22), transparent 42%), radial-gradient(circle at 85% 85%, rgba(22,98,181,0.45), transparent 48%), linear-gradient(160deg,var(--io-blue-900),#03142B 80%);}
#login-view::before{content:''; position:absolute; width:480px;height:480px; border:1px solid rgba(255,255,255,0.07); border-radius:50%; top:-160px; left:-140px;}
#login-view::after{content:''; position:absolute; width:340px;height:340px; border:1px solid rgba(255,255,255,0.07); border-radius:50%; bottom:-120px; right:-100px;}
.login-card{position:relative; z-index:2; width:380px; max-width:calc(100vw - 32px); background:#fff; border-radius:22px; padding:38px 34px; box-shadow:var(--shadow-lg);}
.login-mark{width:56px;height:56px;border-radius:15px; background:linear-gradient(135deg,var(--io-orange-500),var(--io-orange-600)); display:flex; align-items:center; justify-content:center; margin:0 auto 18px; box-shadow:0 10px 26px rgba(245,130,31,0.4);}
.login-mark svg{width:28px;height:28px;}
.login-card h1{text-align:center; font-size:19px; font-weight:700; margin-bottom:4px;}
.login-card .sub{text-align:center; font-size:12.5px; color:var(--ink-600); margin-bottom:26px;}
.field{margin-bottom:16px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--ink-700); margin-bottom:6px;}
.field input{width:100%; padding:11px 13px; border-radius:11px; border:1px solid var(--border); font-size:13px; font-family:inherit; outline:none; background:#FBFCFE; transition:border-color .15s, background .15s;}
.field input:focus{border-color:var(--io-orange-500); background:#fff;}
.btn-primary{display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:12px; font-size:13px; font-weight:600; border-radius:10px; border:1px solid transparent; background:linear-gradient(135deg,var(--io-orange-500),var(--io-orange-600)); color:#fff; box-shadow:0 6px 16px -4px rgba(240,104,15,0.5); transition:all .15s;}
.btn-primary:hover{filter:brightness(1.05); transform:translateY(-1px);}
.btn-primary:disabled{opacity:.6; cursor:not-allowed; transform:none;}
.btn-primary svg{width:15px;height:15px;}
.login-msg{min-height:18px; margin-top:14px; text-align:center; font-size:12.5px; font-weight:600; color:var(--danger);}
.login-foot{text-align:center; margin-top:16px; font-size:11px; color:var(--ink-400);}
</style>
</head>
<body>
<div id="login-view">
  <div class="login-card">
    <div class="login-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22h12"/><path d="M6 18V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v14"/><path d="M6 12h8"/><path d="M18 8h.01"/><path d="M15 6l4.5-2A1 1 0 0 1 21 5v9a2 2 0 0 1-2 2h-.5"/></svg></div>
    <h1>IndianOil Lucky Draw</h1>
    <div class="sub">Operator Console &nbsp;·&nbsp; Sign in to continue</div>
    <form id="loginForm">
      <div class="field"><label>Username</label><input id="username" type="text" autocomplete="username" placeholder="admin@indianoil.org" required></div>
      <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" placeholder="••••••••••" required></div>
      <button type="submit" class="btn-primary" id="loginBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign In
      </button>
      <div class="login-msg" id="msg"></div>
    </form>
    <div class="login-foot">© 2026 Indian Oil Corporation Limited · Internal Use Only</div>
  </div>
</div>

<script>
const form=document.getElementById('loginForm');
const msg=document.getElementById('msg');
const btn=document.getElementById('loginBtn');
form.addEventListener('submit',async(e)=>{
  e.preventDefault();
  msg.textContent='';
  btn.disabled=true;
  const username=document.getElementById('username').value.trim();
  const password=document.getElementById('password').value;
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data=await res.json();
    if(data.ok){window.location.href='/admin.html';}
    else{msg.textContent='⚠ '+(data.error||'Login failed'); btn.disabled=false;}
  }catch(err){msg.textContent='⚠ Could not reach the server. Try again.'; btn.disabled=false;}
});
</script>
</body>
</html>
